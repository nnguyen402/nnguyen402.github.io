<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan Nguyen | Terminal Portfolio</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="terminal-box" onclick="copySSH()" style="background: #1e1e1e; color: #47D69D; padding: 15px; border-radius: 5px; font-family: monospace; cursor: pointer; width: 300px; text-align: center; border: 1px solid #38AB7D; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
    <span id="ssh-text">ssh nathan-nguyen.fly.dev</span>
    <br>
    <span id="copy-alert" style="color: #FF8DA1; font-size: 12px; opacity: 0.8;">(Click to copy)</span>
  </div>

  <div style="margin-top: 40px; text-align: center;">
    <p style="color: #CF8DA1; font-family: monospace; margin-bottom: 10px;">Preview:</p>
    <img 
      src="democonnect.gif" 
      alt="Interactive Terminal Portfolio Preview" 
      style="max-width: 90vw; width: 600px; border-radius: 8px; border: 1px solid #38AB7D; box-shadow: 0 0 15px rgba(71, 214, 157, 0.2);"
    >
  </div>

  <script>
    function copySSH() {
      const textToCopy = "ssh nathan-nguyen.fly.dev";

      navigator.clipboard.writeText(textToCopy).then(() => {
        const alertSpan = document.getElementById("copy-alert");
        alertSpan.innerText = "(Copied to clipboard! Go paste into your local terminal!)";
        alertSpan.style.color = "#47D69D";
        
        setTimeout(() => {
          alertSpan.innerText = "(Click to copy)";
          alertSpan.style.color = "#FF8DA1";
        }, 3500);
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    }
  </script>

</body>
</html>
